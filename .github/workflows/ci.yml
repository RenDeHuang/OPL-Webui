name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/control-plane-go/go.mod

      - name: Run fast verify
        run: npm run verify:fast

      - name: Run API verify
        run: npm run verify:api

      - name: Run UI verify
        run: npm run verify:ui

      - name: Run backend control-plane verify
        run: npm run verify:backend

      - name: Run security scan
        run: npm run verify:security

      - name: Install Chromium for browser e2e
        run: npx --yes playwright install chromium

      - name: Run browser golden path
        run: npm run verify:browser:golden

      - name: Run review gate
        run: npm run gate:review
