name: Cloud Rollout

on:
  workflow_dispatch:
    inputs:
      image:
        description: Full image tag/digest or release short commit tag to deploy.
        required: true
        type: string
      target_environment:
        description: Deployment target.
        required: true
        type: choice
        options:
          - production
      apply:
        description: Run rollout mutation instead of dry-run.
        required: true
        default: false
        type: boolean
      rollback:
        description: Run manual environment-approved rollback instead of forward apply.
        required: true
        default: false
        type: boolean
      authenticated_dogfood_e2e:
        description: Run production authenticated dogfood e2e after approval.
        required: true
        default: false
        type: boolean
      availability_probe:
        description: Run no-secret production availability probe against the public host.
        required: true
        default: false
        type: boolean
      production_browser_e2e:
        description: Run real Chromium production browser e2e after approval.
        required: true
        default: false
        type: boolean
      commercial_cross_repo_browser_canary:
        description: Run scoped commercial cross-repo browser canary after approval without claiming ordinary upstream availability.
        required: true
        default: false
        type: boolean
      commercial_consumer_ready_path_e2e:
        description: Run scoped commercial consumer ready path e2e after approval against OPL-Webui and MedOPL public APIs.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  production-dry-run:
    name: Production Dry Run
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    env:
      OPL_IMAGE: ${{ inputs.image }}
      OPL_NAMESPACE: opl-webui
      OPL_BASE_URL: https://opl.medopl.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image allowlist
        shell: bash
        run: |
          image="$(printf '%s' "$OPL_IMAGE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          short_tag_pattern='^[0-9a-f]{7,40}$'
          if [[ "$image" =~ $short_tag_pattern ]]; then
            image="uswccr.ccs.tencentyun.com/webopl/opl-webui:$image"
          fi
          tag_pattern='^uswccr\.ccs\.tencentyun\.com/webopl/opl-webui:[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'
          digest_pattern='^uswccr\.ccs\.tencentyun\.com/webopl/opl-webui@sha256:[0-9a-f]{64}$'
          if [[ "$image" =~ $tag_pattern || "$image" =~ $digest_pattern ]]; then
            echo "OPL_IMAGE=$image" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "OPL_IMAGE is outside the allowed OPL-Webui image registry." >&2
          exit 1

      - name: Rollout dry-run
        run: |
          if [[ "${{ inputs.rollback }}" == "true" ]]; then
            node scripts/cloud-rollout.mjs --rollback-plan
          else
            node scripts/cloud-rollout.mjs
          fi

  rollout-mutation-guard:
    name: Rollout Mutation Guard
    if: ${{ inputs.apply && inputs.rollback }}
    runs-on: ubuntu-latest
    steps:
      - name: Reject conflicting rollout mutations
        shell: bash
        run: |
          echo "apply=true and rollback=true are mutually exclusive." >&2
          exit 1

  production-image-preflight:
    name: Production Image Preflight
    needs: production-dry-run
    if: ${{ inputs.apply && !inputs.rollback }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    env:
      OPL_IMAGE: ${{ inputs.image }}
      OPL_NAMESPACE: opl-webui
      OPL_BASE_URL: https://opl.medopl.cn
      TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
      TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to TCR for image preflight
        shell: bash
        run: echo "$TCR_PASSWORD" | docker login uswccr.ccs.tencentyun.com --username "$TCR_USERNAME" --password-stdin

      - name: Validate target image exists
        run: node scripts/cloud-rollout.mjs --image-preflight

  production-apply:
    name: Production Apply
    needs: production-image-preflight
    if: ${{ inputs.apply && !inputs.rollback }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    environment: production
    env:
      OPL_IMAGE: ${{ inputs.image }}
      OPL_NAMESPACE: opl-webui
      OPL_BASE_URL: https://opl.medopl.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image allowlist
        shell: bash
        run: |
          image="$(printf '%s' "$OPL_IMAGE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          short_tag_pattern='^[0-9a-f]{7,40}$'
          if [[ "$image" =~ $short_tag_pattern ]]; then
            image="uswccr.ccs.tencentyun.com/webopl/opl-webui:$image"
          fi
          tag_pattern='^uswccr\.ccs\.tencentyun\.com/webopl/opl-webui:[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'
          digest_pattern='^uswccr\.ccs\.tencentyun\.com/webopl/opl-webui@sha256:[0-9a-f]{64}$'
          if [[ "$image" =~ $tag_pattern || "$image" =~ $digest_pattern ]]; then
            echo "OPL_IMAGE=$image" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "OPL_IMAGE is outside the allowed OPL-Webui image registry." >&2
          exit 1

      - name: Write kubeconfig file
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        shell: bash
        run: |
          printf '%s' "$KUBECONFIG_CONTENT" > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"

      - name: Rollout apply
        shell: bash
        run: KUBECONFIG="$RUNNER_TEMP/kubeconfig" node scripts/cloud-rollout.mjs --apply

  production-rollback:
    name: Production Rollback
    needs: production-dry-run
    if: ${{ inputs.rollback && !inputs.apply }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    environment: production
    env:
      OPL_IMAGE: ${{ inputs.image }}
      OPL_NAMESPACE: opl-webui
      OPL_BASE_URL: https://opl.medopl.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image allowlist
        shell: bash
        run: |
          image="$(printf '%s' "$OPL_IMAGE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          short_tag_pattern='^[0-9a-f]{7,40}$'
          if [[ "$image" =~ $short_tag_pattern ]]; then
            image="uswccr.ccs.tencentyun.com/webopl/opl-webui:$image"
          fi
          tag_pattern='^uswccr\.ccs\.tencentyun\.com/webopl/opl-webui:[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'
          digest_pattern='^uswccr\.ccs\.tencentyun\.com/webopl/opl-webui@sha256:[0-9a-f]{64}$'
          if [[ "$image" =~ $tag_pattern || "$image" =~ $digest_pattern ]]; then
            echo "OPL_IMAGE=$image" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "OPL_IMAGE is outside the allowed OPL-Webui image registry." >&2
          exit 1

      - name: Write kubeconfig file
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        shell: bash
        run: |
          printf '%s' "$KUBECONFIG_CONTENT" > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"

      - name: Rollout rollback
        shell: bash
        run: KUBECONFIG="$RUNNER_TEMP/kubeconfig" node scripts/cloud-rollout.mjs --rollback

  production-availability-probe-current:
    name: Production Availability Probe Current
    needs: production-dry-run
    if: ${{ !inputs.apply && !inputs.rollback && inputs.availability_probe }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    env:
      OPL_BASE_URL: https://opl.medopl.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run no-secret availability probe
        run: node scripts/cloud-rollout.mjs --availability-probe

  production-availability-probe-after-apply:
    name: Production Availability Probe After Apply
    needs: production-apply
    if: ${{ inputs.apply && inputs.availability_probe }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    env:
      OPL_BASE_URL: https://opl.medopl.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run no-secret availability probe
        run: node scripts/cloud-rollout.mjs --availability-probe

  production-availability-probe-after-rollback:
    name: Production Availability Probe After Rollback
    needs: production-rollback
    if: ${{ inputs.rollback && inputs.availability_probe }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    env:
      OPL_BASE_URL: https://opl.medopl.cn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run no-secret availability probe
        run: node scripts/cloud-rollout.mjs --availability-probe

  dogfood-request-guard:
    name: Production Dogfood Request Guard
    if: ${{ !inputs.apply && inputs.authenticated_dogfood_e2e }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    steps:
      - name: Reject dogfood without rollout apply
        shell: bash
        run: |
          echo "Dogfood e2e requires apply=true so it can run after rollout canary/smoke evidence." >&2
          exit 1

  production-dogfood-e2e:
    name: Production Authenticated Dogfood E2E
    needs: production-apply
    if: ${{ inputs.apply && inputs.authenticated_dogfood_e2e }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    environment: production
    env:
      OPL_BASE_URL: https://opl.medopl.cn
      OPL_PRODUCTION_DOGFOOD_E2E: 1
      OPL_PRODUCTION_DOGFOOD_REAL_CHAT: ${{ vars.OPL_PRODUCTION_DOGFOOD_REAL_CHAT }}
      OPL_PRODUCTION_DOGFOOD_MEDOPL_READONLY: ${{ vars.OPL_PRODUCTION_DOGFOOD_MEDOPL_READONLY }}
      OPL_DOGFOOD_EMAIL: ${{ secrets.OPL_DOGFOOD_EMAIL }}
      OPL_DOGFOOD_PASSWORD: ${{ secrets.OPL_DOGFOOD_PASSWORD }}
      OPL_DOGFOOD_API_KEY: ${{ secrets.OPL_DOGFOOD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask dogfood secrets
        shell: bash
        run: |
          echo "::add-mask::${OPL_DOGFOOD_API_KEY}"
          echo "::add-mask::${OPL_DOGFOOD_PASSWORD}"

      - name: Run authenticated dogfood e2e
        run: node scripts/cloud-rollout.mjs --dogfood-e2e

  production-browser-e2e:
    name: Production Browser E2E
    needs: production-apply
    if: ${{ inputs.apply && inputs.production_browser_e2e }}
    runs-on: ubuntu-latest
    environment: production
    env:
      OPL_BASE_URL: https://opl.medopl.cn
      OPL_PRODUCTION_BROWSER_E2E: 1
      OPL_DOGFOOD_EMAIL: ${{ secrets.OPL_DOGFOOD_EMAIL }}
      OPL_DOGFOOD_PASSWORD: ${{ secrets.OPL_DOGFOOD_PASSWORD }}
      OPL_DOGFOOD_API_KEY: ${{ secrets.OPL_DOGFOOD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare Chromium for production browser e2e
        shell: bash
        run: |
          set -euo pipefail
          npx --yes playwright install chromium
          browser=''
          if [[ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ]]; then
            browser="$(find "$PLAYWRIGHT_BROWSERS_PATH" -path '*/chrome-linux*/chrome' -type f | sort -r | head -n 1 || true)"
          fi
          if [[ -z "$browser" && -d "$HOME/.cache/ms-playwright" ]]; then
            browser="$(find "$HOME/.cache/ms-playwright" -path '*/chrome-linux*/chrome' -type f | sort -r | head -n 1 || true)"
          fi
          if [[ -z "$browser" ]]; then
            echo "No Chromium binary found after Playwright browser download." >&2
            exit 1
          fi
          "$browser" --version
          echo "OPL_BROWSER_BINARY=$browser" >> "$GITHUB_ENV"

      - name: Mask browser e2e secrets
        shell: bash
        run: |
          echo "::add-mask::${OPL_DOGFOOD_API_KEY}"
          echo "::add-mask::${OPL_DOGFOOD_PASSWORD}"

      - name: Run production browser e2e
        run: node tests/browser/research-main-path-runner.mjs --production

  commercial-cross-repo-browser-canary:
    name: Commercial Cross-Repo Browser Canary
    needs: production-apply
    if: ${{ inputs.apply && inputs.commercial_cross_repo_browser_canary }}
    runs-on: ubuntu-latest
    environment: production
    env:
      OPL_BASE_URL: https://opl.medopl.cn
      OPL_COMMERCIAL_CROSS_REPO_BROWSER_CANARY: 1
      OPL_DOGFOOD_EMAIL: ${{ secrets.OPL_DOGFOOD_EMAIL }}
      OPL_DOGFOOD_PASSWORD: ${{ secrets.OPL_DOGFOOD_PASSWORD }}
      OPL_DOGFOOD_API_KEY: ${{ secrets.OPL_DOGFOOD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare Chromium for commercial cross-repo browser canary
        shell: bash
        run: |
          set -euo pipefail
          npx --yes playwright install chromium
          browser=''
          if [[ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ]]; then
            browser="$(find "$PLAYWRIGHT_BROWSERS_PATH" -path '*/chrome-linux*/chrome' -type f | sort -r | head -n 1 || true)"
          fi
          if [[ -z "$browser" && -d "$HOME/.cache/ms-playwright" ]]; then
            browser="$(find "$HOME/.cache/ms-playwright" -path '*/chrome-linux*/chrome' -type f | sort -r | head -n 1 || true)"
          fi
          if [[ -z "$browser" ]]; then
            echo "No Chromium binary found after Playwright browser download." >&2
            exit 1
          fi
          "$browser" --version
          echo "OPL_BROWSER_BINARY=$browser" >> "$GITHUB_ENV"

      - name: Mask commercial canary secrets
        shell: bash
        run: |
          echo "::add-mask::${OPL_DOGFOOD_API_KEY}"
          echo "::add-mask::${OPL_DOGFOOD_PASSWORD}"

      - name: Run commercial cross-repo browser canary
        run: node tests/browser/research-main-path-runner.mjs --commercial-cross-repo-canary

  commercial-consumer-ready-path-e2e:
    name: Commercial Consumer Ready Path E2E
    needs: production-apply
    if: ${{ inputs.apply && inputs.commercial_consumer_ready_path_e2e }}
    runs-on: [self-hosted, tencent-cloud, opl-webui]
    environment: production
    env:
      OPL_BASE_URL: https://opl.medopl.cn
      MEDOPL_PUBLIC_BASE_URL: https://portal.medopl.cn
      OPL_COMMERCIAL_CONSUMER_E2E: 1
      OPL_DOGFOOD_EMAIL: ${{ secrets.OPL_DOGFOOD_EMAIL }}
      OPL_DOGFOOD_PASSWORD: ${{ secrets.OPL_DOGFOOD_PASSWORD }}
      OPL_DOGFOOD_API_KEY: ${{ secrets.OPL_DOGFOOD_API_KEY }}
      MEDOPL_SESSION_BOOTSTRAP_SECRET_SHA256: ${{ secrets.MEDOPL_SESSION_BOOTSTRAP_SECRET_SHA256 }}
      MEDOPL_WEBHOOK_SECRET: ${{ secrets.MEDOPL_WEBHOOK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask commercial consumer secrets
        shell: bash
        run: |
          echo "::add-mask::${OPL_DOGFOOD_API_KEY}"
          echo "::add-mask::${OPL_DOGFOOD_PASSWORD}"
          echo "::add-mask::${MEDOPL_WEBHOOK_SECRET}"
          echo "::add-mask::${MEDOPL_SESSION_BOOTSTRAP_SECRET_SHA256}"

      - name: Run commercial consumer ready path e2e
        run: node scripts/cloud-rollout.mjs --commercial-consumer-e2e
