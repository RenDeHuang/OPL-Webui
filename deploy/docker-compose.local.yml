services:
  opl-webui:
    build:
      context: ..
      dockerfile: Dockerfile
    image: opl-webui:local
    env_file:
      - ./.env.example
    environment:
      - OPL_WEBUI_ENV=development
      - HOST=0.0.0.0
      - PORT=4173
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4173/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

# local compose = local verification.
# OPL-Webui does not own runtime/storage/payment/artifact truth.
# MedOPL owns runtime/resource/storage/billing/payment.
# one-person-lab owns framework/execution semantics.
